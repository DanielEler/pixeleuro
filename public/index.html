<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelEuro – 1 Pixel. 1 Euro. Forever on the internet.</title>
  <meta name="description" content="The pixel wall: 1 pixel = 1 euro. Grab your piece of internet history – pay once, stay forever. Only 125,000 pixels, then it's gone." />
  <meta property="og:title" content="PixelEuro – 1 Pixel. 1 Euro." />
  <meta property="og:description" content="Grab your piece of the pixel wall before it's sold out forever." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- Old-school banner: title + live counter (the whole page IS the wall) -->
  <header id="banner">
    <div class="banner-inner">
      <img class="banner-logo" src="/logo.svg" alt="PixelEuro" />
      <div class="banner-title">
        <h1><span id="siteName">PixelEuro</span></h1>
        <p class="banner-tag">1 pixel = <span id="pricePer">1&nbsp;€</span> &middot; <span class="blink">●</span> forever on the internet</p>
      </div>
      <div class="counter">
        <span><b id="soldCount">–</b> sold</span>
        <span><b id="freeCount">–</b> free</span>
        <span class="of">/ 125,000</span>
      </div>
    </div>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  </header>

  <!-- Toolbar -->
  <div class="wall-toolbar">
    <button id="addImageBtn" type="button" class="retro-btn primary">🖼️ Add your image</button>
    <input type="file" id="imgInput" accept="image/png,image/jpeg,image/webp,image/gif" hidden />
    <div class="img-bar hidden" id="imgBar">
      <label for="imgSize">Size</label>
      <input type="range" id="imgSize" min="8" max="120" value="32" />
      <span id="imgSizeVal">32 px</span>
      <button id="imgRemove" type="button" class="retro-btn">✕ Remove</button>
    </div>
    <div class="zoom">
      <button id="zoomOut" type="button" aria-label="Zoom out">−</button>
      <button id="zoomIn" type="button" aria-label="Zoom in">+</button>
    </div>
    <button class="retro-btn buy" id="buyBtn" disabled>Add an image to continue →</button>
  </div>

  <!-- THE WALL = full-width, edge to edge -->
  <main id="wand">
    <div class="canvas-wrap" id="canvasWrap">
      <div id="world"><canvas id="grid"></canvas></div>
      <div id="selBadge" class="sel-badge hidden"></div>
    </div>
  </main>

  <footer class="footer">
    <a href="/legal/impressum.html">Imprint</a> ·
    <a href="/legal/datenschutz.html">Privacy</a> ·
    <a href="/legal/agb.html">Terms</a> ·
    © <span id="year"></span> PixelEuro · drag your image onto a free spot &amp; grab your pixels
  </footer>

  <!-- Buy modal -->
  <div class="modal hidden" id="buyModal">
    <div class="modal-box">
      <button class="modal-close" id="modalClose">✕</button>
      <h3>Your pixels</h3>
      <p class="selinfo">
        <b id="selPixels">0</b> pixels &nbsp;·&nbsp; Price: <b id="selPrice">0.00 €</b>
      </p>
      <form id="buyForm">
        <label>Click-through link (optional)
          <input type="url" name="link" id="linkInput" placeholder="https://your-site.com" />
        </label>
        <label>Tooltip text (optional)
          <input type="text" name="title" id="titleInput" maxlength="120" placeholder="e.g. your brand name" />
        </label>
        <label>Email for the receipt
          <input type="email" name="email" id="emailInput" placeholder="you@example.com" required />
        </label>
        <label class="check">
          <input type="checkbox" id="agreeInput" required />
          I accept the <a href="/legal/agb.html" target="_blank">Terms</a> &
          <a href="/legal/datenschutz.html" target="_blank">Privacy Policy</a>.
        </label>
        <button type="submit" class="cta" id="payBtn">Continue to payment →</button>
        <p class="formerror hidden" id="formError"></p>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
