name: Inspect first pixel
on: { workflow_dispatch: {} }
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
      - name: Dump first ad + pixel
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" '
            cd /home/semesto/PixelEuro
            echo "===== AD BEHIND THE LIVE PIXEL (ad 12) ====="
            docker compose exec -T pixeleuro-db psql -U pixel -d pixelwebsite -x -c "SELECT id,x,y,w,h,pixel_count,title,link,email,status,approved,amount_cents,created_at,paid_at,reserved_until,now() AS now,length(image) AS image_bytes,image_mime FROM ads WHERE id=12;" 2>&1 || echo "(query failed)"
            echo "===== ALL NON-EXPIRED ADS ====="
            docker compose exec -T pixeleuro-db psql -U pixel -d pixelwebsite -x -c "SELECT id,x,y,w,h,title,link,email,status,approved,amount_cents,created_at,paid_at FROM ads WHERE status <> '"'"'expired'"'"' ORDER BY created_at ASC;" 2>&1 || true
            echo "===== AD 12 IMAGE (base64, for inspection) ====="
            docker compose exec -T pixeleuro-db psql -U pixel -d pixelwebsite -t -A -c "SELECT encode(image,'"'"'base64'"'"') FROM ads WHERE id=12;" 2>&1 | head -c 4000 || true
            echo ""
          '
